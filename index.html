<head>

<title>Modelo de Datos Relacional — SAF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181b22;
    --border: #252830;
    --border2: #2e333f;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
    /* Category colors */
    --c-hub: #f43f5e;
    --c-transaccional: #3b82f6;
    --c-catalogo: #a78bfa;
    --c-relacional: #10b981;
    --c-estructural: #f59e0b;
    --c-operacional: #475569;
    /* Keys */
    --pk-color: #fbbf24;
    --fk-color: #34d399;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header { display: flex; align-items: center; gap: 12px; padding: 10px 18px; background: var(--surface); border-bottom: 1px solid var(--border2); z-index: 100; flex-shrink: 0; flex-wrap: wrap; }
  .logo { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
  .logo span { font-weight: 400; opacity: 0.5; }
  .stats { display: flex; gap: 10px; }
  .stat { font-size: 10px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 9px; }
  .stat b { color: #3b82f6; font-family: 'JetBrains Mono', monospace; }
  .header-right { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  #search-wrap { position: relative; }
  #search { width: 240px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 6px 10px 6px 28px; outline: none; transition: border-color 0.2s; }
  #search:focus { border-color: #3b82f6; }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; pointer-events: none; }
  #search-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; max-height: 260px; overflow-y: auto; z-index: 300; display: none; box-shadow: var(--shadow); }
  .sr-item { padding: 7px 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 11px; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 8px; }
  .sr-item:hover { background: var(--surface2); }
  .sr-cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sr-comment { color: var(--text3); font-size: 9px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; padding: 5px 11px; font-size: 10px; cursor: pointer; transition: all 0.15s; font-family: 'Syne', sans-serif; white-space: nowrap; }
  .btn:hover { border-color: #3b82f6; color: var(--text); }
  .btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

  /* WORKSPACE */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  #sidebar { width: 230px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .sidebar-header { padding: 8px 12px; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }

  /* CATEGORY FILTERS */
  .cat-filters { padding: 8px 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
  .cat-filter-btn { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; font-size: 10px; color: var(--text2); background: transparent; text-align: left; width: 100%; }
  .cat-filter-btn:hover { background: var(--surface2); color: var(--text); }
  .cat-filter-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }
  .cat-filter-btn.active .cat-pill-dot { opacity: 1; }
  .cat-pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; opacity: 0.5; transition: opacity 0.15s; }
  .cat-count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text3); }

  #table-list { overflow-y: auto; flex: 1; }
  #table-list::-webkit-scrollbar { width: 3px; }
  #table-list::-webkit-scrollbar-thumb { background: var(--border2); }
  .tl-item { padding: 5px 12px; font-size: 10px; font-family: 'JetBrains Mono', monospace; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; color: var(--text2); transition: background 0.1s; }
  .tl-item:hover { background: var(--surface2); color: var(--text); }
  .tl-item.selected { background: rgba(59,130,246,0.12); color: #3b82f6; }
  .tl-item.hidden-item { display: none; }
  .tl-cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* CANVAS */
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
  #canvas-wrap::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
  #canvas { position: absolute; transform-origin: 0 0; }

  /* TABLE CARDS */
  .table-card { position: absolute; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); cursor: grab; user-select: none; transition: box-shadow 0.2s, border-color 0.2s, opacity 0.2s; }
  .table-card:active { cursor: grabbing; }
  .table-card.dimmed { opacity: 0.07; pointer-events: none; }
  .table-card.highlighted { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.35), 0 4px 24px rgba(0,0,0,0.5); z-index: 10; }
  .table-card.related { border-color: var(--fk-color); box-shadow: 0 0 0 1px rgba(52,211,153,0.3), 0 4px 20px rgba(0,0,0,0.4); z-index: 5; }
  .card-header { padding: 9px 12px 7px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; }
  .card-cat-stripe { width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0; }
  .card-title { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text); flex: 1; word-break: break-all; line-height: 1.3; }
  .card-badge { font-size: 8px; padding: 2px 5px; border-radius: 3px; white-space: nowrap; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  .card-comment { font-size: 9px; color: var(--text3); padding: 3px 12px 5px; border-bottom: 1px solid var(--border); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .col-list { padding: 3px 0; max-height: 200px; overflow-y: auto; }
  .col-list::-webkit-scrollbar { width: 2px; }
  .col-list::-webkit-scrollbar-thumb { background: var(--border2); }
  .col-row { display: flex; align-items: center; gap: 5px; padding: 2px 12px; font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text2); }
  .col-row:hover { background: var(--surface2); }
  .col-icon { width: 13px; height: 13px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; flex-shrink: 0; }
  .ci-pk { background: rgba(251,191,36,0.2); color: var(--pk-color); }
  .ci-fk { background: rgba(52,211,153,0.2); color: var(--fk-color); }
  .ci-none { background: transparent; }
  .col-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-name.is-pk { color: var(--pk-color); }
  .col-name.is-fk { color: var(--fk-color); }
  .col-type { color: var(--text3); font-size: 8.5px; white-space: nowrap; }
  .card-footer { padding: 4px 12px; border-top: 1px solid var(--border); font-size: 8.5px; color: var(--text3); display: flex; justify-content: space-between; }

  /* SVG */
  #svg-layer { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
  .fk-line { fill: none; stroke-width: 1.5; }
  .fk-line.dim { stroke: rgba(255,255,255,0.04); stroke-dasharray: 4 3; }
  .fk-line.active-out { stroke: rgba(59,130,246,0.85); stroke-width: 2; }
  .fk-line.active-in { stroke: rgba(52,211,153,0.75); stroke-width: 1.8; }
  .fk-line.global { stroke: rgba(59,130,246,0.2); stroke-dasharray: 4 3; }

  /* DETAIL PANEL */
  #detail-panel { position: absolute; right: 14px; top: 14px; width: 280px; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; box-shadow: var(--shadow); z-index: 50; display: none; max-height: calc(100vh - 80px); overflow-y: auto; }
  #detail-panel::-webkit-scrollbar { width: 3px; }
  #detail-panel::-webkit-scrollbar-thumb { background: var(--border2); }
  .dp-header { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; justify-content: space-between; }
  .dp-title { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .dp-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0 2px; }
  .dp-close:hover { color: var(--text); }
  .dp-section { padding: 8px 14px; border-bottom: 1px solid var(--border); }
  .dp-section-title { font-size: 8.5px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); margin-bottom: 5px; font-weight: 700; }
  .dp-cat-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .dp-rows { font-size: 20px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #3b82f6; }
  .dp-comment { font-size: 10px; color: var(--text2); line-height: 1.5; font-style: italic; }
  .dp-rel { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 3px 0; color: var(--text2); display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .dp-rel:hover { color: #3b82f6; }
  .dp-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .dp-metric { background: var(--surface2); border-radius: 6px; padding: 6px 8px; }
  .dp-metric-val { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text); }
  .dp-metric-lbl { font-size: 8px; color: var(--text3); margin-top: 1px; }

  .zoom-controls { position: absolute; bottom: 18px; left: 18px; display: flex; flex-direction: column; gap: 3px; z-index: 50; }
  .zoom-btn { width: 30px; height: 30px; background: var(--surface); border: 1px solid var(--border2); color: var(--text2); border-radius: 7px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .zoom-btn:hover { border-color: #3b82f6; color: var(--text); }

  .legend { position: absolute; bottom: 18px; right: 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 9px; z-index: 50; display: flex; flex-direction: column; gap: 4px; }

  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* LOADING */
  #loading { position: absolute; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; font-size: 12px; color: var(--text2); }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* FOCUS MODE indicator */
  #focus-mode-bar { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.4); border-radius: 20px; padding: 5px 14px; font-size: 10px; color: #93c5fd; z-index: 60; pointer-events: none; }
</style>

    <div id="dp-rels-in"></div>
  </div>
</div>

let zoom = 0.5, panX = 0, panY = 0;
let isPanning = false, panStart = {x:0,y:0};
let tablePositions = {};
let selectedTable = null;

const canvas = document.getElementById('canvas');

const canvasWrap = document.getElementById('canvas-wrap');

// Build lookups
const tableMap = {};
SCHEMA.tables.forEach(t => tableMap[t.name] = t);

const fksByTable = {};
SCHEMA.tables.forEach(t => { fksByTable[t.name] = {out:[], in:[]}; });
SCHEMA.fks.forEach(fk => {
  if (fksByTable[fk.from_table]) fksByTable[fk.from_table].out.push(fk);
  if (fksByTable[fk.to_table])   fksByTable[fk.to_table].in.push(fk);
});

// Stats
// Stats updated dynamically by updateVisibility()

// Layout
const CARD_W = 260, CARD_GAP = 36, COLS = 10;
function initLayout() {
  const sorted = [...SCHEMA.tables].sort((a,b) => (b.fk_in+b.fk_out)-(a.fk_in+a.fk_out));
  const ROW_H = 340;
  sorted.forEach((t, i) => {
    tablePositions[t.name] = {
      x: (i % COLS) * (CARD_W + CARD_GAP) + 30,
      y: Math.floor(i / COLS) * ROW_H + 30
    };
  });
}

// Category filters sidebar
function renderCatFilters() {
  const wrap = document.getElementById('cat-filters');
  const catCounts = {};
  SCHEMA.tables.forEach(t => { catCounts[t.category] = (catCounts[t.category]||0)+1; });
  wrap.innerHTML = Object.entries(CATEGORIES).map(([key, cat]) => `
    <button class="cat-filter-btn active" data-cat="${key}" onclick="toggleCatFilter('${key}',this)">
      <div class="cat-pill-dot" style="background:${cat.color}"></div>
      <span>${cat.label}</span>
      <span class="cat-count">${catCounts[key]||0}</span>
    </button>
  `).join('');
}

function toggleCatFilter(cat, btn) {
  if (activeCatFilters.has(cat)) {
    if (activeCatFilters.size === 1) return;
    activeCatFilters.delete(cat);
    btn.classList.remove('active');
  } else {
    activeCatFilters.add(cat);
    btn.classList.add('active');
  }
  updateVisibility();
}

function updateVisibility() {
  const visibleTables = SCHEMA.tables.filter(t => activeCatFilters.has(t.category));
  const visibleCols   = visibleTables.reduce((a,t) => a + t.columns.length, 0);
  const visibleFks    = SCHEMA.fks.filter(fk => {
    const ft = tableMap[fk.from_table], tt = tableMap[fk.to_table];
    return ft && tt && activeCatFilters.has(ft.category) && activeCatFilters.has(tt.category);
  }).length;

  const visibleRows   = visibleTables.reduce((a,t) => a + t.num_rows, 0);

  document.getElementById('s-tables').textContent = visibleTables.length;
  document.getElementById('s-cols').textContent   = visibleCols.toLocaleString();
  document.getElementById('s-fks').textContent    = visibleFks;
  document.getElementById('s-rows').textContent   = visibleRows.toLocaleString();
  document.getElementById('tl-count').textContent = visibleTables.length;

  document.querySelectorAll('.tl-item').forEach(el => {
    const t = tableMap[el.dataset.table];
    if (!t) return;
    if (activeCatFilters.has(t.category)) el.classList.remove('hidden-item');
    else el.classList.add('hidden-item');
  });
  document.querySelectorAll('.table-card').forEach(el => {
    const t = tableMap[el.dataset.table];
    if (!t) return;
    el.style.display = activeCatFilters.has(t.category) ? '' : 'none';
  });
  updateLines();
}

// Legend
function renderLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = Object.entries(CATEGORIES).map(([k,c]) =>
    `<div class="leg-item"><div class="leg-dot" style="background:${c.color}"></div><span>${c.label}</span></div>`
  ).join('');
}

// Sidebar list
function renderSidebar() {
  const list = document.getElementById('table-list');
  const sorted = [...SCHEMA.tables].sort((a,b) => a.name.localeCompare(b.name));
  list.innerHTML = sorted.map(t => `
    <div class="tl-item" data-table="${t.name}" onclick="focusTable('${t.name}')">
      <div class="tl-cat-dot" style="background:${CATEGORIES[t.category]?.color||'#666'}"></div>
      ${t.name}
    </div>
  `).join('');
}

// Render cards
function renderCards() {
  canvas.innerHTML = '';
  SCHEMA.tables.forEach(t => {
    const pos = tablePositions[t.name];
    const card = document.createElement('div');
    card.className = 'table-card';
    card.dataset.table = t.name;
    card.style.left = pos.x + 'px';
    card.style.top  = pos.y + 'px';
    const cat = CATEGORIES[t.category] || CATEGORIES.operacional;
    const pkSet = new Set(t.pks);
    const fkSet = new Set(t.fk_cols);

    const colsHtml = t.columns.map(c => {
      const isPK = pkSet.has(c.name), isFK = fkSet.has(c.name);
      const icon = isPK ? `<div class="col-icon ci-pk">PK</div>` : isFK ? `<div class="col-icon ci-fk">FK</div>` : `<div class="col-icon ci-none"></div>`;
      return `<div class="col-row"><span>${icon}</span><span class="col-name ${isPK?'is-pk':isFK?'is-fk':''}">${c.name}</span><span class="col-type">${c.type}</span></div>`;
    }).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="card-cat-stripe" style="background:${cat.color}"></div>
        <div class="card-title">${t.name}</div>
        ${t.fk_total>0?`<div class="card-badge" style="background:${cat.color}22;color:${cat.color}">${t.fk_total}R</div>`:''}
      </div>
      ${t.comment?`<div class="card-comment">${t.comment}</div>`:''}
      <div class="col-list">${colsHtml}</div>
      <div class="card-footer"><span>${t.columns.length} cols</span><span>${t.num_rows.toLocaleString()} filas</span></div>
    `;

    card.addEventListener('mousedown', e => {
      if (e.target.closest('.col-list')) return;
      draggingCard = t.name; wasDragged = false;
      const cw = canvasWrap.getBoundingClientRect();
      dragOffset.x = (e.clientX - cw.left - panX) / zoom - tablePositions[t.name].x;
      dragOffset.y = (e.clientY - cw.top  - panY) / zoom - tablePositions[t.name].y;
      e.stopPropagation();
    });
    card.addEventListener('click', e => {
      if (!wasDragged) selectTable(t.name);
    });
    canvas.appendChild(card);
  });
}

function getCardEl(name) { return document.querySelector(`.table-card[data-table="${name}"]`); }

// SELECT TABLE — focus mode: hide all others
function updateKPIs(tableNames) {
  const ts    = tableNames.map(n => tableMap[n]).filter(Boolean);
  const cols  = ts.reduce((a,t) => a + t.columns.length, 0);
  const rows  = ts.reduce((a,t) => a + t.num_rows, 0);
  const nameSet = new Set(tableNames);
  const fksV  = SCHEMA.fks.filter(fk => nameSet.has(fk.from_table) && nameSet.has(fk.to_table)).length;
  document.getElementById('s-tables').textContent = ts.length;
  document.getElementById('s-cols').textContent   = cols.toLocaleString();
  document.getElementById('s-fks').textContent    = fksV;
  document.getElementById('s-rows').textContent   = rows.toLocaleString();
  document.getElementById('tl-count').textContent = ts.length;
}

function selectTable(name) {
  selectedTable = (name === selectedTable) ? null : name;

  if (!selectedTable) {
    document.querySelectorAll('.table-card').forEach(c => {
      c.classList.remove('highlighted','related','dimmed');
      if (activeCatFilters.has(tableMap[c.dataset.table]?.category)) c.style.display = '';
    });
    document.querySelectorAll('.tl-item').forEach(c => c.classList.remove('selected'));
    detailPanel.style.display = 'none';
    document.getElementById('focus-mode-bar').style.display = 'none';
    updateLines();
    const visibleTables = SCHEMA.tables.filter(t => activeCatFilters.has(t.category));
    updateKPIs(visibleTables.map(t => t.name));
    return;
  }

  const relatedSet = new Set();
  fksByTable[selectedTable].out.forEach(fk => relatedSet.add(fk.to_table));
  fksByTable[selectedTable].in.forEach(fk  => relatedSet.add(fk.from_table));
  const focusedNames = [selectedTable, ...relatedSet];

  document.querySelectorAll('.table-card').forEach(c => {
    const tn = c.dataset.table;
    c.classList.remove('highlighted','related','dimmed');
    if (tn === selectedTable) {
      c.classList.add('highlighted');
      c.style.display = '';
    } else if (relatedSet.has(tn)) {
      c.classList.add('related');
      c.style.display = '';
    } else {
      c.style.display = 'none';
    }
  });

  document.querySelectorAll('.tl-item').forEach(c => {
    c.classList.toggle('selected', c.dataset.table === selectedTable);
  });
  const sideItem = document.querySelector(`.tl-item[data-table="${selectedTable}"]`);
  if (sideItem) sideItem.scrollIntoView({block:'nearest'});

  updateKPIs(focusedNames);
  document.getElementById('focus-mode-bar').style.display = 'block';
  showDetailPanel(selectedTable);
  updateLines();
}

function showDetailPanel(name) {
  const t = tableMap[name];
  if (!t) return;
  const cat = CATEGORIES[t.category] || CATEGORIES.operacional;
  document.getElementById('dp-title').textContent = name;
  document.getElementById('dp-title').style.color = cat.color;
  document.getElementById('dp-rows').textContent = t.num_rows.toLocaleString();
  document.getElementById('dp-cols-m').textContent = t.col_count;
  document.getElementById('dp-fkin').textContent = t.fk_in;
  document.getElementById('dp-fkout').textContent = t.fk_out;
  document.getElementById('dp-cat').innerHTML = `<div class="dp-cat-badge" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">${cat.label} — ${cat.desc}</div>`;
  document.getElementById('dp-comment').textContent = t.comment || '(sin descripción)';

  const outsHtml = fksByTable[name].out.map(fk =>
    `<div class="dp-rel" onclick="focusTable('${fk.to_table}')">
      <span style="color:var(--pk-color)">${fk.from_col}</span>
      <span style="color:var(--text3)">→</span>
      <span style="color:${CATEGORIES[tableMap[fk.to_table]?.category]?.color||'#aaa'}">${fk.to_table}</span>
    </div>`
  ).join('') || '<div style="font-size:10px;color:var(--text3)">Ninguna</div>';

  const insHtml = fksByTable[name].in.map(fk =>
    `<div class="dp-rel" onclick="focusTable('${fk.from_table}')">
      <span style="color:${CATEGORIES[tableMap[fk.from_table]?.category]?.color||'#aaa'}">${fk.from_table}</span>
      <span style="color:var(--text3)">→</span>
      <span style="color:var(--fk-color)">${fk.from_col}</span>
    </div>`
  ).join('') || '<div style="font-size:10px;color:var(--text3)">Ninguna</div>';

  document.getElementById('dp-rels-out').innerHTML = outsHtml;
  document.getElementById('dp-rels-in').innerHTML = insHtml;
  detailPanel.style.display = 'block';
}

// Lines
function updateLines() {
  svgLayer.innerHTML = '';
  if (!selectedTable && !showGlobalLines) return;

  let lines = [];
  if (selectedTable) {
    const outs = fksByTable[selectedTable].out.map(fk => ({...fk, type:'out'}));
    const ins  = fksByTable[selectedTable].in.map(fk  => ({...fk, type:'in'}));
    lines = [...outs, ...ins];
  } else if (showGlobalLines) {
    lines = SCHEMA.fks.map(fk => ({...fk, type:'global'})).filter(fk => {
      const ft = tableMap[fk.from_table], tt = tableMap[fk.to_table];
      return ft && tt && activeCatFilters.has(ft.category) && activeCatFilters.has(tt.category);
    });
  }

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svgLayer.appendChild(defs);

  lines.forEach((fk, idx) => {
    if (fk.from_table === fk.to_table) return;
    const fromEl = getCardEl(fk.from_table);
    const toEl   = getCardEl(fk.to_table);
    if (!fromEl || !toEl || fromEl.style.display==='none' || toEl.style.display==='none') return;

    const fp = tablePositions[fk.from_table], tp = tablePositions[fk.to_table];
    const fh = fromEl.offsetHeight, th = toEl.offsetHeight;
    const x1 = fp.x + 130, y1 = fp.y + fh/2;
    const x2 = tp.x + 130, y2 = tp.y + th/2;
    const cx = (x1+x2)/2;

    const color = fk.type==='out' ? 'rgba(59,130,246,0.85)' : fk.type==='in' ? 'rgba(52,211,153,0.75)' : 'rgba(59,130,246,0.2)';
    const mid = `m${idx}`;
    defs.innerHTML += `<marker id="a${mid}" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="${color}"/>
    </marker>`;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`);
    path.setAttribute('class', `fk-line ${fk.type==='global'?'global':fk.type==='out'?'active-out':'active-in'}`);
    path.setAttribute('marker-end', `url(#a${mid})`);
    svgLayer.appendChild(path);
  });
}

// Transform
function updateTransform() {
  canvas.style.transform   = `translate(${panX}px,${panY}px) scale(${zoom})`;
  svgLayer.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  updateLines();
}

// Panning
canvasWrap.addEventListener('mousedown', e => {
  if (draggingCard) return;
  isPanning = true;
  panStart = {x: e.clientX-panX, y: e.clientY-panY};
  canvasWrap.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (draggingCard) {
    const cw = canvasWrap.getBoundingClientRect();
    const nx = (e.clientX - cw.left - panX) / zoom - dragOffset.x;
    const ny = (e.clientY - cw.top  - panY) / zoom - dragOffset.y;
    if (Math.abs(nx-tablePositions[draggingCard].x)>2 || Math.abs(ny-tablePositions[draggingCard].y)>2) wasDragged=true;
    tablePositions[draggingCard] = {x:nx, y:ny};
    const c = getCardEl(draggingCard);
    if (c) { c.style.left=nx+'px'; c.style.top=ny+'px'; }
    updateLines(); return;
  }
  if (!isPanning) return;
  panX = e.clientX - panStart.x; panY = e.clientY - panStart.y;
  updateTransform();
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  canvasWrap.style.cursor = '';
  setTimeout(()=>{ draggingCard=null; }, 10);
});
canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const cw = canvasWrap.getBoundingClientRect();
  const mx = e.clientX-cw.left, my = e.clientY-cw.top;
  const nz = Math.max(0.08, Math.min(2.5, zoom*(e.deltaY>0?0.9:1.1)));
  panX = mx-(mx-panX)*(nz/zoom); panY = my-(my-panY)*(nz/zoom);
  zoom = nz; updateTransform();
}, {passive:false});

// Buttons
document.getElementById('z-in').onclick  = () => { zoom=Math.min(2.5,zoom*1.2); updateTransform(); };
document.getElementById('z-out').onclick = () => { zoom=Math.max(0.08,zoom/1.2); updateTransform(); };
document.getElementById('z-reset').onclick = () => { zoom=1; panX=0; panY=0; updateTransform(); };

document.getElementById('btn-fit').onclick = () => {
  const visible = Object.entries(tablePositions).filter(([n])=>getCardEl(n)?.style.display!=='none');
  if (!visible.length) return;
  const xs=visible.map(([,p])=>p.x), ys=visible.map(([,p])=>p.y);
  const cw=canvasWrap.getBoundingClientRect();
  const fw=Math.max(...xs)+280-Math.min(...xs), fh=Math.max(...ys)+200-Math.min(...ys);
  zoom=Math.min(cw.width/fw, cw.height/fh)*0.88;
  panX=(cw.width-fw*zoom)/2-Math.min(...xs)*zoom;
  panY=(cw.height-fh*zoom)/2-Math.min(...ys)*zoom;
  updateTransform();
};

document.getElementById('btn-reset').onclick = () => {
  selectedTable = null;
  document.querySelectorAll('.table-card').forEach(c => {
    c.classList.remove('highlighted','related','dimmed');
    const t = tableMap[c.dataset.table];
    c.style.display = (t && activeCatFilters.has(t.category)) ? '' : 'none';
  });
  document.querySelectorAll('.tl-item').forEach(c=>c.classList.remove('selected'));
  detailPanel.style.display='none';
  document.getElementById('focus-mode-bar').style.display='none';
  updateLines();
  const visibleTables = SCHEMA.tables.filter(t => activeCatFilters.has(t.category));
  updateKPIs(visibleTables.map(t => t.name));
};

document.getElementById('btn-toggle-lines').onclick = function() {
  showGlobalLines = !showGlobalLines;
  this.classList.toggle('active', showGlobalLines);
  updateLines();
};

document.getElementById('dp-close').onclick = () => { document.getElementById('btn-reset').click(); };

// Search
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.style.display='none'; return; }
  const matches = SCHEMA.tables.filter(t=>t.name.toLowerCase().includes(q)||(t.comment||'').toLowerCase().includes(q)).slice(0,14);
  const catColorMap = Object.fromEntries(Object.entries(CATEGORIES).map(([k,v])=>[k,v.color]));
  searchResults.innerHTML = matches.map(t =>
    `<div class="sr-item" onclick="focusTable('${t.name}');searchInput.value='';searchResults.style.display='none'">
      <div class="sr-cat-dot" style="background:${catColorMap[t.category]||'#666'}"></div>
      <div><div>${t.name}</div>${t.comment?`<span class="sr-comment">${t.comment}</span>`:''}</div>
    </div>`
  ).join('');
  searchResults.style.display = matches.length ? 'block':'none';
});
document.addEventListener('click', e => { if(!e.target.closest('#search-wrap')) searchResults.style.display='none'; });

function focusTable(name) {
  selectTable(name);
  const pos = tablePositions[name];
  if (!pos) return;
  const cw = canvasWrap.getBoundingClientRect();
  panX = cw.width/2  - (pos.x+130)*zoom;
  panY = cw.height/2 - (pos.y+80)*zoom;
  updateTransform();
}

// INIT
function init() {
  initLayout();
  renderCatFilters();
  renderSidebar();
  renderLegend();
  renderCards();
  updateVisibility();
  setTimeout(() => {
    document.getElementById('btn-fit').click();
    document.getElementById('loading').style.display='none';
  }, 400);
}
init();
</script>
